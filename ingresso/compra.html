<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprar Ingresso - Copa do Mundo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Ingressos Copa do Mundo 2026</h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="compra.html">Comprar Ingresso</a>
            <a href="contato.html">Contato</a>
        </nav>
    </header>

    <main>
        <h2>Formulário de Compra</h2>
        <form action="#" method="POST">
            <div class="form-group">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="partida">Selecione a Partida:</label>
                <select id="partida" name="partida" required>
                    <option value="">-- Escolha um jogo --</option>
                    <option value="jogo1">Abertura - Grupo A</option>
                    <option value="jogo2">Brasil vs Alemanha - Grupo B</option>
                    <option value="jogo3">Quartas de Final</option>
                    <option value="jogo4">Grande Final</option>
                </select>
            </div>

            <div class="form-group">
                <label for="quantidade">Quantidade de Ingressos:</label>
                <input type="number" id="quantidade" name="quantidade" min="1" max="4" required>
            </div>

            <button type="submit">Finalizar Compra</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Venda de Ingressos Copa do Mundo. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
