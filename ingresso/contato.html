<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Copa do Mundo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Ingressos Copa do Mundo 2026</h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="compra.html">Comprar Ingresso</a>
            <a href="contato.html">Contato</a>
        </nav>
    </header>

    <main>
        <h2>Formulário de Contato</h2>
        <form action="#" method="POST">
            <div class="form-group">
                <label for="nome-contato">Nome:</label>
                <input type="text" id="nome-contato" name="nome-contato" required>
            </div>

            <div class="form-group">
                <label for="email-contato">E-mail:</label>
                <input type="email" id="email-contato" name="email-contato" required>
            </div>

            <div class="form-group">
                <label for="mensagem">Mensagem / Dúvida:</label>
                <textarea id="mensagem" name="mensagem" rows="5" required></textarea>
            </div>

            <button type="submit">Enviar Mensagem</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Venda de Ingressos Copa do Mundo. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
